# 信贷规则策略分析输入契约。所有 null、空列表和候选项均须由用户确认后填写。
task:
  product_form: null              # revolving | installment | credit_line | custom
  repayment_type: null
  scenario: null                  # first_loan_admission | reloan_admission | limit_adjustment | portfolio_review | custom
  task_type: null                 # rule_mining | rule_combination | strategy_evaluation | final_report

confirmation:
  receipt_path: null              # 独立用户确认凭证 JSON

sample_scope:
  population: null                # application | approved | booked | mature_booked | rejected | mixed
  date_col: sample_date
  start_date: null
  end_date: null
  mature_flag_col: mature_flag
  include_immature: false
  filters: []

analysis_grain:
  grain: null                     # customer | application | loan | drawdown | customer_window
  id_cols: []
  label_grain: null
  feature_grain: null
  output_grain: null
  aggregation_rule: null          # 用户确认的跨颗粒度聚合规则

field_mapping:
  mode: null                      # user_provided | candidate_then_user_confirmed
  confirmed: false
  candidate_columns: {}
  unmapped_required_fields: []
  notes: null

label:
  target_col: null
  positive_class: 1
  bad_definition: null
  maturity_rule: null
  exclude_values: []

amount_metric:
  enabled: false
  numerator: null
  denominator: null
  formula: null
  filter: null

columns:
  id_cols: []
  target_col: null
  date_col: sample_date
  old_decision_col: null
  new_decision_col: null

feature_policy:
  candidate_features: []
  exclude_features: []
  excluded_name_tokens: []
  protected_columns: []
  allow_protected_override: false
  protected_overrides: []
  protected_override_reason: null

rule_mining:
  iv_screening: null
  binning: null
  numeric_cut_sources: []
  category_grouping: null
  min_hit_count: null
  min_hit_rate: null
  stability_window: null
  cart_enabled: null
  cart_min_leaf_samples: null

rule_combination:
  top_n: null
  rank_by: null                   # 必须为 lift_desc
  execution_mode: null            # 必须为 sequential_reject
  tie_policy: null

strategy_evaluation:
  compare_with_old_strategy: false
  old_decision_col: null
  new_decision_col: null
  comparison_population: null
  swap_in_observability: null     # estimated | unobservable
  swap_in_estimation_method: null
  segment_columns: []

final_report:
  source_manifests: []
  title: null
  report_scope: null
  redaction_policy: null

input:
  path: null
  encoding: utf-8

output:
  directory: null                 # 必须与 --run-dir 解析后的绝对路径一致
  output_contract_version: "1.0"
  write_detail: true
  write_summary: true
  write_manifest: true
  write_html: false
